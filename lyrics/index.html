<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mien Christian Songs Lyrics</title>
    <link rel="stylesheet" href="/lyrics/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      fetch('/lyrics/config.json')
        .then(response => response.json())
        .then(config => {
          const ga_tag = config.ga_tag;
          const script = document.createElement('script');
          script.async = true;
          script.src = `https://www.googletagmanager.com/gtag/js?id=${ga_tag}`;
          document.head.appendChild(script);

          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', ga_tag);
        });
    </script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Mien Christian Songs Lyrics</h1>
            <h2>เนื้อเพลงคริสเตียนภาษาเมี่ยน (ภาษาเย้า)</h2>
        </div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="search-bar" placeholder="Search for a song... / ค้นหาเนื้อเพลง">
            <button id="search-button">SEARCH</button>
        </div>

        <div class="table-container">
            <table id="songs-table">
                <thead>
                    <tr>
                        <th data-column="englishname">English Name <span class="sort-indicator"></span></th>
                        <th data-column="mienthainame">Mien-Thai Name <span class="sort-indicator"></span></th>
                        <th data-column="thainame">Thai Name <span class="sort-indicator"></span></th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Song rows will be inserted here -->
                </tbody>
            </table>
        </div>

        <div class="pagination-container">
            <div class="pagination-controls">
                <button id="prev-page">&laquo; Prev</button>
                <div id="page-numbers"></div>
                <button id="next-page">Next &raquo;</button>
            </div>
            <div class="items-per-page-container">
                <label for="items-per-page">Items per page:</label>
                <select id="items-per-page">
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                </select>
            </div>
        </div>
    </main>

    <script src="/lyrics/main.js"></script>
</body>
</html>
