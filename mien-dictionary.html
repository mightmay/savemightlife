  <script>
    (function () {
      var hosts = ["https://mien.azurewebsites.net", "https://yiumien.azurewebsites.net"];

      function shuffle(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = arr[i];
          arr[i] = arr[j];
          arr[j] = t;
        }
        return arr;
      }

      function probeHost(host, timeoutMs) {
        return new Promise(function (resolve) {
          var img = new Image();
          var done = false;
          var timer = setTimeout(function () {
            if (done) return;
            done = true;
            resolve(false);
          }, timeoutMs);

          function finish(ok) {
            if (done) return;
            done = true;
            clearTimeout(timer);
            resolve(ok);
          }

          img.onload = function () { finish(true); };
          img.onerror = function () { finish(false); };
          img.src = host + "/favicon.ico?ts=" + Date.now() + "_" + Math.random().toString(16).slice(2);
        });
      }

      function pickHost() {
        var checks = hosts.map(function (h) { return probeHost(h, 1800); });
        return Promise.all(checks).then(function (results) {
          var available = [];
          for (var i = 0; i < results.length; i++) {
            if (results[i]) available.push(hosts[i]);
          }
          if (available.length === 0) return hosts[0];
          if (available.length === 1) return available[0];
          shuffle(available);
          return available[0];
        }).catch(function () {
          return hosts[0];
        });
      }

      function wireForm() {
        var form = document.getElementById("searchForm");
        var input = document.getElementById("searchInput");
        if (!form || !input) return;

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var q = (input.value || "").trim();
          if (!q) return;
          pickHost().then(function (host) {
            var url = host + "/searchresult?wordtosearch=" + encodeURIComponent(q);
            window.location.href = url;
          });
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        wireForm();
      });
    })();
  </script>
